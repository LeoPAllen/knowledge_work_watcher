name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test extension
        run: npm run test:extension

      - name: Test backend
        run: npm run test:backend

      - name: Test ETL
        run: npm run test:etl

      - name: Test workflow tools
        run: npm run test:workflow

      - name: Check manifest and repository policy
        run: npm run check

      - name: Package extension
        run: npm run package:extension

      - name: Upload review package
        uses: actions/upload-artifact@v4
        with:
          name: knowledge-work-watcher-extension
          path: dist/knowledge-work-watcher-*.zip
          if-no-files-found: error
