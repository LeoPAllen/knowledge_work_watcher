<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Knowledge Work Watcher</title>
    <link rel="stylesheet" href="../shared/styles.css">
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="panel">
      <header>
        <p class="eyebrow">Research extension</p>
        <h1>Knowledge Work Watcher</h1>
      </header>

      <dl class="status-list" aria-label="Extension status">
        <div class="status-row">
          <dt>Consent status</dt>
          <dd>
            <span id="consent-dot" class="status-dot" aria-hidden="true"></span>
            <span id="consent-status">Loading...</span>
          </dd>
        </div>
        <div class="status-row">
          <dt>Ambient capture</dt>
          <dd>
            <span id="capture-dot" class="status-dot" aria-hidden="true"></span>
            <span id="capture-status">Loading...</span>
          </dd>
        </div>
      </dl>

      <p class="notice">
        Controls are active, but browsing capture and server upload are not
        implemented.
      </p>
      <button id="capture-action" type="button" hidden></button>
      <button id="open-options" type="button">Open options</button>
      <p id="popup-status" class="feedback" role="status"></p>
    </main>
    <script type="module" src="popup.mjs"></script>
  </body>
</html>
